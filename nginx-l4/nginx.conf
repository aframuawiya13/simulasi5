events {}

# Layer 4 Load Balancing (TCP Proxying)
stream {
    upstream backend_servers {
        # Menggunakan algoritma default Round Robin
        server web_server_1:80;
        server web_server_2:80;
    }

    server {
        listen 8084; # Berjalan di port 8084 lokal
        proxy_pass backend_servers;
    }
}