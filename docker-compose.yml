services:
  # Node Server 1 (Dashboard Biru Modern)
  web_server_1:
    image: nginx:alpine
    container_name: web_server_1
    command:
      - /bin/sh
      - -c
      - |
        cat << 'EOF' > /usr/share/nginx/html/index.html
        <!DOCTYPE html>
        <html lang="id">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Cluster Node 1</title>
            <script src="https://cdn.tailwindcss.com"></script>
        </head>
        <body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex items-center justify-center p-6">
            <div class="max-w-4xl w-full bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl overflow-hidden">
                <div class="p-6 bg-indigo-600 flex justify-between items-center">
                    <div>
                        <span class="text-xs uppercase tracking-wider font-semibold text-indigo-200">Production Environment</span>
                        <h1 class="text-2xl font-bold flex items-center gap-2">Web Server 1 <span class="animate-pulse text-xl">🚀</span></h1>
                    </div>
                    <span class="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-xs font-semibold border border-emerald-500/30">ONLINE</span>
                </div>
                <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/50">
                        <p class="text-sm text-slate-400">IP Container</p>
                        <p class="text-lg font-mono font-bold text-indigo-400">web_server_1:80</p>
                    </div>
                    <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/50">
                        <p class="text-sm text-slate-400">Response Time</p>
                        <p class="text-lg font-mono font-bold text-amber-400">1.2ms (Optimal)</p>
                    </div>
                    <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/50">
                        <p class="text-sm text-slate-400">Arsitektur</p>
                        <p class="text-lg font-mono font-bold text-purple-400">Cluster Balanced</p>
                    </div>
                </div>
                <div class="px-6 pb-6 text-center text-xs text-slate-500 border-t border-slate-700/50 pt-4">
                    Simulasi Web Server Cluster & Load Balancing — Terhubung via Layer 7 Proxy
                </div>
            </div>
        </body>
        </html>
        EOF
        nginx -g 'daemon off;'

  # Node Server 2 (Dashboard Hijau Modern)
  web_server_2:
    image: nginx:alpine
    container_name: web_server_2
    command:
      - /bin/sh
      - -c
      - |
        cat << 'EOF' > /usr/share/nginx/html/index.html
        <!DOCTYPE html>
        <html lang="id">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Cluster Node 2</title>
            <script src="https://cdn.tailwindcss.com"></script>
        </head>
        <body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex items-center justify-center p-6">
            <div class="max-w-4xl w-full bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl overflow-hidden">
                <div class="p-6 bg-emerald-600 flex justify-between items-center">
                    <div>
                        <span class="text-xs uppercase tracking-wider font-semibold text-emerald-200">Production Environment</span>
                        <h1 class="text-2xl font-bold flex items-center gap-2">Web Server 2 <span class="animate-pulse text-xl">🎉</span></h1>
                    </div>
                    <span class="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-xs font-semibold border border-emerald-500/30">ONLINE</span>
                </div>
                <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/50">
                        <p class="text-sm text-slate-400">IP Container</p>
                        <p class="text-lg font-mono font-bold text-emerald-400">web_server_2:80</p>
                    </div>
                    <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/50">
                        <p class="text-sm text-slate-400">Response Time</p>
                        <p class="text-lg font-mono font-bold text-amber-400">0.9ms (Optimal)</p>
                    </div>
                    <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/50">
                        <p class="text-sm text-slate-400">Arsitektur</p>
                        <p class="text-lg font-mono font-bold text-purple-400">Cluster Balanced</p>
                    </div>
                </div>
                <div class="px-6 pb-6 text-center text-xs text-slate-500 border-t border-slate-700/50 pt-4">
                    Simulasi Web Server Cluster & Load Balancing — Terhubung via Layer 7 Proxy
                </div>
            </div>
        </body>
        </html>
        EOF
        nginx -g 'daemon off;'

  # Load Balancer Layer 4
  lb_layer4:
    image: nginx:alpine
    container_name: lb_layer4
    ports:
      - "8084:8084"
    command:
      - /bin/sh
      - -c
      - |
        echo "events {} stream { upstream backend_servers { server web_server_1:80; server web_server_2:80; } server { listen 8084; proxy_pass backend_servers; } }" > /etc/nginx/nginx.conf
        nginx -g 'daemon off;'
    depends_on:
      - web_server_1
      - web_server_2

  # Load Balancer Layer 7
  lb_layer7:
    image: nginx:alpine
    container_name: lb_layer7
    ports:
      - "8087:8087"
    command:
      - /bin/sh
      - -c
      - |
        echo "events {} http { charset utf-8; upstream backend_servers { server web_server_1:80; server web_server_2:80; } server { listen 8087; location / { proxy_pass http://backend_servers; } } }" > /etc/nginx/nginx.conf
        nginx -g 'daemon off;'
    depends_on:
      - web_server_1
      - web_server_2